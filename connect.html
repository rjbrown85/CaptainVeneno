<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect &mdash; Captain Veneno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;400;500;600;700&family=Barlow+Condensed:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0a0a0b;--panel:#121214;--venom:#7cff3f;--blood:#e1232f;
    --ink:#e9e9ea;--muted:#9a9a9f;--line:#26262b;
    --head:'Comic Sans MS','Comic Sans',cursive;--sub:'Comic Sans MS','Comic Sans',cursive;--body:'Comic Sans MS','Comic Sans',cursive;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--black);color:var(--ink);font-family:var(--body);font-size:18px;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  header.nav{position:sticky;top:0;z-index:50;background:rgba(10,10,11,.86);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .nav-inner{max-width:1180px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:18px}
  .brand{font-family:var(--head);font-size:24px;letter-spacing:.04em;text-transform:uppercase}
  .brand span{color:var(--venom)}
  .nav-links a{font-family:var(--sub);text-transform:uppercase;letter-spacing:.08em;font-size:13px;font-weight:500;color:var(--muted);padding:7px 11px;border-radius:3px;transition:.15s}
  .nav-links a:hover{color:var(--black);background:var(--venom)}
  .stage{min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;text-align:center;padding:60px 22px;
    background:radial-gradient(1000px 460px at 50% 0%, rgba(124,255,63,.10), transparent 60%),linear-gradient(180deg,#0c0c0e,#080809)}
  .stage .wrap{max-width:820px}
  .eyebrow{font-family:var(--sub);text-transform:uppercase;letter-spacing:.32em;font-size:13px;color:var(--venom);margin-bottom:18px}
  h1{font-family:var(--head);text-transform:uppercase;font-size:clamp(40px,8vw,96px);line-height:.92;margin-bottom:26px}
  h1 .x{color:var(--venom)}
  p.msg{font-size:clamp(20px,3vw,28px);color:#d6d6da;font-weight:300;line-height:1.45}
  p.sub{color:var(--muted);margin-top:24px;font-size:18px}
  .btn{display:inline-block;font-family:var(--sub);text-transform:uppercase;letter-spacing:.12em;font-size:15px;font-weight:600;
    padding:14px 26px;border:2px solid var(--venom);color:var(--venom);border-radius:2px;transition:.15s;margin-top:40px}
  .btn:hover{background:var(--venom);color:var(--black)}
</style>
</head>
<body>
<header class="nav">
  <div class="nav-inner">
    <div class="brand"><a href="index.html">CAPTAIN <span>VENENO</span></a></div>
    <nav class="nav-links"><a href="index.html">&larr; Back to site</a></nav>
  </div>
</header>

<section class="stage">
  <div class="wrap">
    <div class="eyebrow">Connect</div>
    <h1>Book a <span class="x">gig</span></h1>
    <p class="msg">Yeah, just go to Imbibe on the weekend. You'll probably find Josh or someone, and then we can book gigs.</p>
    <p class="sub">That's the whole system. It works. Mostly.</p>
    <a href="index.html#contact" class="btn">Or send a message</a>
  </div>
</section>
</body>
</html>
